<header><div class="brand"><span class="brand-mark"></span><h1>Spot share map</h1></div><p class="tagline">勉強・作業に使える場所を、駅から探して記録する地図。</p><p class="note">みんなで見つけた、勉強・作業できる場所を共有しよう</p></header>
<section class="auth-panel" id="authPanel"><div class="auth-summary"><span>ゲストとして閲覧中</span><button class="auth-link" id="authToggleBtn" type="button">ログイン／新規登録</button></div><div class="auth-form" id="authForm"><p>新規作成またはログインすると、自分だけのお気に入り一覧を確認できます。</p><div class="auth-tabs"><button class="chip primary" id="loginModeBtn" type="button">ログイン</button><button class="chip ghost" id="signupModeBtn" type="button">新規作成</button></div><div class="auth-fields"><div class="field"><label for="authName">ユーザー名</label><input class="input" id="authName" type="text" autocomplete="username" placeholder="例: study_taro"></div><div class="field"><label for="authPass">パスワード</label><input class="input" id="authPass" type="password" autocomplete="current-password" placeholder="4文字以上"></div></div><p class="auth-error" id="authError"></p><button class="chip primary" id="authSubmitBtn" type="button">ログイン</button></div></section>
<div class="userbar"><span id="userText"></span><button class="chip ghost" id="logoutBtn" type="button">ログアウト</button></div>
<nav class="tabs" aria-label="画面切り替え"><button class="tab active" data-tab="browse">探す</button><button class="tab" data-tab="add">場所を登録</button></nav>
<main>
<section class="view active" id="view-browse"><div class="filters"><div class="searchbox"><input class="input" id="stationSearch" type="search" placeholder="駅名・店名で検索 例: 横浜駅"><button class="chip primary" id="stationSearchBtn" type="button">検索</button></div><select class="select" id="walkFilter" aria-label="徒歩分数"><option value="0">徒歩分数を指定しない</option><option value="5">徒歩5分以内</option><option value="10">徒歩10分以内</option><option value="15">徒歩15分以内</option></select><button class="chip ghost" id="favFilter" type="button">お気に入りのみ</button><button class="chip ghost" data-cat="カフェ・飲食店" type="button">カフェ</button><button class="chip ghost" data-cat="無料スペース" type="button">無料</button><button class="chip ghost" data-cat="図書館" type="button">図書館</button><button class="chip ghost" data-cat="コワーキング" type="button">コワーキング</button><p class="status" id="searchStatus">駅名を入れて検索すると、その駅周辺へ地図が移動します。</p></div><div class="layout"><div id="map"></div><aside class="listpane"><p class="result-count" id="resultCount"></p><div id="cardList"></div></aside></div></section>
<section class="view" id="view-add"><div class="form-wrap"><p class="form-title" id="formTitle">場所を登録</p><div class="field"><label for="f-name">店名・場所名</label><input class="input" id="f-name" type="text" placeholder="例: 中央図書館"></div><div class="row2"><div class="field"><label for="f-station">最寄り駅</label><input class="input" id="f-station" type="text" placeholder="例: 横浜駅"></div><div class="field"><label for="f-walk">駅から徒歩</label><input class="input" id="f-walk" type="number" min="0" placeholder="分"></div></div><div class="field"><label for="f-category">カテゴリ</label><select class="select" id="f-category"><option>カフェ・飲食店</option><option>無料スペース</option><option>図書館</option><option>コワーキング</option><option>その他</option></select></div><div class="toggles"><label><input id="f-free" type="checkbox"> 無料</label><label><input id="f-wifi" type="checkbox"> Wi-Fi</label><label><input id="f-outlet" type="checkbox"> 電源</label></div><div class="field"><label for="f-hours">営業時間</label><input class="input" id="f-hours" type="text" placeholder="例: 9:00-21:00"></div><div class="field"><label for="f-notes">メモ</label><textarea class="input" id="f-notes" placeholder="混み具合、席数、注意点など"></textarea></div><div class="field"><label for="addMapStationSearch">地図の位置</label><div class="station-jump-row"><input class="input" id="addMapStationSearch" type="search" placeholder="駅名で移動 例: 横浜駅"><button class="chip primary" id="addMapStationBtn" type="button">移動</button></div><div id="addMap"></div><p class="hint" id="pinHint">駅名で移動してから、地図をクリックしてピンを置いてください。</p></div><div class="submit-row"><button class="primary" id="submitBtn" type="button">保存</button><button class="ghost" id="cancelEditBtn" type="button" style="display:none">キャンセル</button></div></div></section>
</main>

<script>
const FAV_KEY="spot-favorites",TOKYO=[35.681236,139.767125],CATS=["カフェ・飲食店","無料スペース","図書館","コワーキング","その他"],USERNAME_RE=/^[A-Za-z0-9_.-]{3,20}$/,firebaseConfig={apiKey:"AIzaSyCm0ZJTl2-fMFo7ukM5H7pSD9QC-5MUfvc",authDomain:"spot-share-map-85fe8.firebaseapp.com",projectId:"spot-share-map-85fe8",storageBucket:"spot-share-map-85fe8.firebasestorage.app",messagingSenderId:"839147032077",appId:"1:839147032077:web:78f96fda1f58482e9dcf44"};firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.firestore();let spots=[],favorites=new Set(),activeCats=new Set(),favOnly=false,editingId=null,pendingLatLng=null,addMarker=null,searchMarker=null,browseMarkers={},currentUser=null,currentUid=null,authMode="login",pendingAuthMessage="";function usernameToEmail(username){return username.trim().toLowerCase()+"@spotsharemap.app"}const map=L.map("map").setView(TOKYO,12),addMap=L.map("addMap").setView(TOKYO,12),markerLayer=L.layerGroup().addTo(map),tileOptions={attribution:"&copy; OpenStreetMap contributors",maxZoom:19,crossOrigin:true};L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",tileOptions).addTo(map);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",tileOptions).addTo(addMap);function $(id){return document.getElementById(id)}function showToast(message){const toast=$("toast");toast.textContent=message;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),2200)}function escapeHtml(value){return String(value||"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]))}function normalizeCategory(value){const text=String(value||"");if(CATS.includes(text))return text;if(text.includes("図書")||text.includes("譖"))return"図書館";if(text.includes("無料")||text.includes("辟"))return"無料スペース";if(text.includes("コワ")||text.includes("繝ｯ"))return"コワーキング";if(text.includes("カフェ")||text.includes("飲")||text.includes("繧ｫ"))return"カフェ・飲食店";return"その他"}function normalizeSpot(id,spot){return{id,name:spot.name||"",station:spot.station||"",walk:spot.walk||null,category:normalizeCategory(spot.category),free:Boolean(spot.free),wifi:Boolean(spot.wifi),outlet:Boolean(spot.outlet),hours:spot.hours||"",notes:spot.notes||"",lat:Number.isFinite(Number(spot.lat))?Number(spot.lat):null,lng:Number.isFinite(Number(spot.lng))?Number(spot.lng):null,ratingSum:Number(spot.ratingSum||0),ratingCount:Number(spot.ratingCount||0)}}let spotsUnsub=null;function startSpotsListener(){if(spotsUnsub)return;spotsUnsub=db.collection("spots").onSnapshot(snapshot=>{spots=snapshot.docs.map(doc=>normalizeSpot(doc.id,doc.data()));renderList()},err=>{console.error(err);showToast("スポットの読み込みに失敗しました")})}async function loadFavorites(){if(currentUid){try{const doc=await db.collection("favorites").doc(currentUid).get();favorites=new Set(doc.exists?(doc.data().ids||[]):[])}catch(err){console.error(err);favorites=new Set()}}else{try{favorites=new Set(JSON.parse(localStorage.getItem(FAV_KEY+":guest")||"[]"))}catch{favorites=new Set()}}renderList()}async function saveFavorites(){if(currentUid){try{await db.collection("favorites").doc(currentUid).set({ids:[...favorites]})}catch(err){console.error(err)}}else{localStorage.setItem(FAV_KEY+":guest",JSON.stringify([...favorites]))}}function catColor(category){return{"カフェ・飲食店":"#e5a23d","無料スペース":"#4f8064","図書館":"#4f759c","コワーキング":"#cf6658","その他":"#7a8794"}[category]||"#7a8794"}function makeIcon(category){const color=catColor(category);return L.divIcon({className:"",html:'<div style="width:17px;height:17px;border-radius:50%;background:'+color+';box-shadow:0 0 0 3px rgba(255,255,255,.82),0 2px 10px rgba(0,0,0,.35)"></div>',iconSize:[17,17],iconAnchor:[8,8]})}function filteredSpots(){const query=$("stationSearch").value.trim().toLowerCase(),walkMax=Number($("walkFilter").value||0);return spots.filter(spot=>{const station=String(spot.station||"").toLowerCase(),name=String(spot.name||"").toLowerCase();if(query&&!station.includes(query)&&!name.includes(query))return false;if(walkMax&&(!spot.walk||Number(spot.walk)>walkMax))return false;if(activeCats.size&&!activeCats.has(spot.category))return false;if(favOnly&&!favorites.has(spot.id))return false;return true})}function renderList(){const list=filteredSpots();$("resultCount").textContent=list.length+"件のスポット";const cardList=$("cardList");cardList.innerHTML="";if(!list.length)cardList.innerHTML='<div class="empty">条件に合う登録スポットはありません。<br>駅名検索だけでも地図は移動できます。</div>';for(const spot of list){const card=document.createElement("article");card.className="card";const rating=spot.ratingCount?"評価 "+(spot.ratingSum/spot.ratingCount).toFixed(1):"未評価";card.innerHTML='<div class="card-top"><p class="card-name">'+escapeHtml(spot.name||"名称未設定")+'</p><button class="fav" type="button" title="お気に入り">'+(favorites.has(spot.id)?"★":"☆")+'</button></div><p class="card-meta">'+escapeHtml(spot.station||"駅未設定")+(spot.walk?' ・ 徒歩'+escapeHtml(spot.walk)+'分':"")+(spot.hours?' ・ '+escapeHtml(spot.hours):"")+'</p><div class="badge-row"><span class="badge">'+escapeHtml(spot.category)+'</span>'+(spot.free?'<span class="badge free">無料</span>':"")+(spot.wifi?'<span class="badge">Wi-Fi</span>':"")+(spot.outlet?'<span class="badge">電源</span>':"")+'<span class="badge">'+rating+'</span></div>';card.addEventListener("click",event=>{if(event.target.closest(".fav"))return;openModal(spot.id);if(spot.lat!=null&&spot.lng!=null)map.setView([spot.lat,spot.lng],16)});card.querySelector(".fav").addEventListener("click",()=>toggleFavorite(spot.id));cardList.appendChild(card)}rebuildBrowseMarkers(list)}function rebuildBrowseMarkers(list=filteredSpots()){markerLayer.clearLayers();browseMarkers={};for(const spot of list){if(spot.lat==null||spot.lng==null)continue;const marker=L.marker([spot.lat,spot.lng],{icon:makeIcon(spot.category)}).addTo(markerLayer);marker.bindPopup('<b>'+escapeHtml(spot.name)+'</b><br>'+escapeHtml(spot.station||"")+(spot.walk?' 徒歩'+escapeHtml(spot.walk)+'分':""));marker.on("click",()=>openModal(spot.id));browseMarkers[spot.id]=marker}}async function geocodeStation(query){const trimmed=query.trim();if(!trimmed)return null;const stationQuery=/駅$/.test(trimmed)?trimmed:trimmed+"駅",params=new URLSearchParams({format:"jsonv2",limit:"1",countrycodes:"jp",addressdetails:"1",q:stationQuery});const response=await fetch("https://nominatim.openstreetmap.org/search?"+params.toString(),{headers:{"Accept-Language":"ja"}});if(!response.ok)throw new Error("geocode failed");const results=await response.json();return results&&results[0]?{lat:Number(results[0].lat),lng:Number(results[0].lon),name:results[0].display_name||stationQuery}:null}async function jumpBrowseToStation(){const query=$("stationSearch").value.trim();if(!query){$("searchStatus").textContent="駅名を入力してください。";renderList();return}const matchingSpot=filteredSpots().find(spot=>spot.lat!=null&&spot.lng!=null);if(matchingSpot)map.setView([matchingSpot.lat,matchingSpot.lng],15);$("stationSearchBtn").disabled=true;$("searchStatus").textContent="駅を検索しています...";try{const result=await geocodeStation(query);if(!result){$("searchStatus").textContent="駅が見つかりませんでした。表記を変えて試してください。";return}if(searchMarker)map.removeLayer(searchMarker);searchMarker=L.circleMarker([result.lat,result.lng],{radius:9,color:"#18212b",weight:2,fillColor:"#e5a23d",fillOpacity:.9}).addTo(map).bindPopup("検索した駅周辺").openPopup();map.setView([result.lat,result.lng],15);$("searchStatus").textContent=query+"周辺へ移動しました。登録済みスポットが表示されます。"}catch{$("searchStatus").textContent="検索に失敗しました。インターネット接続を確認してください。"}finally{$("stationSearchBtn").disabled=false;setTimeout(()=>map.invalidateSize(),80)}}async function jumpAddMapToStation(){const query=$("addMapStationSearch").value.trim()||$("f-station").value.trim();if(!query){showToast("駅名を入力してください");return}$("addMapStationBtn").disabled=true;try{const result=await geocodeStation(query);if(!result){showToast("駅が見つかりませんでした");return}addMap.setView([result.lat,result.lng],16);$("pinHint").textContent="地図をクリックして、実際の場所にピンを置いてください。"}catch{showToast("検索に失敗しました")}finally{$("addMapStationBtn").disabled=false;setTimeout(()=>addMap.invalidateSize(),80)}}function placeAddMarker(latlng){pendingLatLng=latlng;if(addMarker)addMap.removeLayer(addMarker);addMarker=L.marker(latlng,{draggable:true,icon:makeIcon($("f-category").value)}).addTo(addMap);addMarker.on("dragend",()=>{pendingLatLng=addMarker.getLatLng();updatePinHint()});updatePinHint()}function updatePinHint(){if(pendingLatLng)$("pinHint").textContent="ピン設定済み: 緯度 "+pendingLatLng.lat.toFixed(5)+" / 経度 "+pendingLatLng.lng.toFixed(5)}function resetForm(){editingId=null;pendingLatLng=null;if(addMarker)addMap.removeLayer(addMarker);addMarker=null;for(const id of["f-name","f-station","f-walk","f-hours","f-notes","addMapStationSearch"])$(id).value="";$("f-category").value="カフェ・飲食店";$("f-free").checked=false;$("f-wifi").checked=false;$("f-outlet").checked=false;$("formTitle").textContent="場所を登録";$("submitBtn").textContent="保存";$("cancelEditBtn").style.display="none";$("pinHint").textContent="駅名で移動してから、地図をクリックしてピンを置いてください。"}async function submitSpot(){const name=$("f-name").value.trim();if(!name){showToast("店名・場所名を入力してください");return}const existing=editingId?spots.find(spot=>spot.id===editingId):null,record={name,station:$("f-station").value.trim(),walk:Number($("f-walk").value)||null,category:$("f-category").value,free:$("f-free").checked,wifi:$("f-wifi").checked,outlet:$("f-outlet").checked,hours:$("f-hours").value.trim(),notes:$("f-notes").value.trim(),lat:pendingLatLng?pendingLatLng.lat:null,lng:pendingLatLng?pendingLatLng.lng:null,ratingSum:existing?existing.ratingSum:0,ratingCount:existing?existing.ratingCount:0};$("submitBtn").disabled=true;try{if(editingId){await db.collection("spots").doc(editingId).set(record)}else{await db.collection("spots").add(record)}const savedLat=record.lat,savedLng=record.lng;resetForm();switchTab("browse");showToast("保存しました");if(savedLat!=null&&savedLng!=null)map.setView([savedLat,savedLng],16)}catch(err){console.error(err);showToast("保存に失敗しました。通信環境を確認してください。")}finally{$("submitBtn").disabled=false}}function openModal(id){const spot=spots.find(item=>item.id===id);if(!spot)return;$("modalContent").innerHTML='<div class="modal-top"><div><h2>'+escapeHtml(spot.name||"名称未設定")+'</h2><p class="card-meta">'+escapeHtml(spot.category)+' ・ '+escapeHtml(spot.station||"駅未設定")+(spot.walk?' ・ 徒歩'+escapeHtml(spot.walk)+'分':"")+'</p></div><button class="close" id="modalClose" type="button">×</button></div><div class="badge-row">'+(spot.free?'<span class="badge free">無料</span>':"")+(spot.wifi?'<span class="badge">Wi-Fi</span>':"")+(spot.outlet?'<span class="badge">電源</span>':"")+(spot.hours?'<span class="badge">'+escapeHtml(spot.hours)+'</span>':"")+'</div><p class="modal-notes">'+(spot.notes?escapeHtml(spot.notes):"メモはまだありません。")+'</p><div class="modal-actions"><button id="favModalBtn" type="button">'+(favorites.has(spot.id)?"お気に入り解除":"お気に入り")+'</button><button id="editModalBtn" type="button">編集</button><button class="danger" id="deleteModalBtn" type="button">削除</button></div>';$("modalBg").classList.add("show");$("modalClose").addEventListener("click",closeModal);$("favModalBtn").addEventListener("click",()=>toggleFavorite(spot.id));$("editModalBtn").addEventListener("click",()=>startEdit(spot.id));$("deleteModalBtn").addEventListener("click",()=>deleteSpot(spot.id))}function closeModal(){$("modalBg").classList.remove("show")}async function toggleFavorite(id){favorites.has(id)?favorites.delete(id):favorites.add(id);renderList();if($("modalBg").classList.contains("show"))openModal(id);await saveFavorites()}function startEdit(id){const spot=spots.find(item=>item.id===id);if(!spot)return;closeModal();switchTab("add");editingId=id;$("formTitle").textContent="場所を編集";$("submitBtn").textContent="変更を保存";$("cancelEditBtn").style.display="";$("f-name").value=spot.name||"";$("f-station").value=spot.station||"";$("f-walk").value=spot.walk||"";$("f-category").value=normalizeCategory(spot.category);$("f-free").checked=Boolean(spot.free);$("f-wifi").checked=Boolean(spot.wifi);$("f-outlet").checked=Boolean(spot.outlet);$("f-hours").value=spot.hours||"";$("f-notes").value=spot.notes||"";$("addMapStationSearch").value=spot.station||"";if(spot.lat!=null&&spot.lng!=null){placeAddMarker(L.latLng(spot.lat,spot.lng));addMap.setView([spot.lat,spot.lng],16)}setTimeout(()=>addMap.invalidateSize(),100)}async function deleteSpot(id){if(!confirm("このスポットを削除しますか？"))return;try{await db.collection("spots").doc(id).delete();if(favorites.has(id)){favorites.delete(id);await saveFavorites()}closeModal();showToast("削除しました")}catch(err){console.error(err);showToast("削除に失敗しました。通信環境を確認してください。")}}function switchTab(tabName){document.querySelectorAll(".tab").forEach(tab=>tab.classList.toggle("active",tab.dataset.tab===tabName));document.querySelectorAll(".view").forEach(view=>view.classList.toggle("active",view.id==="view-"+tabName));setTimeout(()=>{map.invalidateSize();addMap.invalidateSize()},80)}document.querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>switchTab(tab.dataset.tab)));document.querySelectorAll("[data-cat]").forEach(button=>button.addEventListener("click",()=>{const cat=button.dataset.cat;activeCats.has(cat)?activeCats.delete(cat):activeCats.add(cat);button.classList.toggle("active",activeCats.has(cat));renderList()}));$("stationSearchBtn").addEventListener("click",jumpBrowseToStation);$("stationSearch").addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();jumpBrowseToStation()}});$("stationSearch").addEventListener("input",renderList);$("walkFilter").addEventListener("change",renderList);$("favFilter").addEventListener("click",()=>{favOnly=!favOnly;$("favFilter").classList.toggle("active",favOnly);renderList()});$("addMapStationBtn").addEventListener("click",jumpAddMapToStation);$("addMapStationSearch").addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();jumpAddMapToStation()}});addMap.on("click",event=>placeAddMarker(event.latlng));$("submitBtn").addEventListener("click",submitSpot);$("cancelEditBtn").addEventListener("click",()=>{resetForm();switchTab("browse")});$("modalBg").addEventListener("click",event=>{if(event.target.id==="modalBg")closeModal()});function setAuthMode(mode){authMode=mode;$("loginModeBtn").classList.toggle("primary",mode==="login");$("loginModeBtn").classList.toggle("ghost",mode!=="login");$("signupModeBtn").classList.toggle("primary",mode==="signup");$("signupModeBtn").classList.toggle("ghost",mode!=="signup");$("authSubmitBtn").textContent=mode==="signup"?"アカウント作成":"ログイン";$("authError").textContent=""}function enterApp(username,uid){currentUser=username;currentUid=uid;document.body.classList.remove("signed-out");document.body.classList.add("signed-in");$("authPanel").classList.remove("open");$("userText").innerHTML="ログイン中: <b>"+escapeHtml(username)+"</b> / お気に入りはこのアカウント専用です";loadFavorites();setTimeout(()=>{map.invalidateSize();addMap.invalidateSize()},150)}function showAuth(message=""){currentUser=null;currentUid=null;document.body.classList.remove("signed-in");document.body.classList.add("signed-out");$("authError").textContent=message;loadFavorites();setTimeout(()=>{map.invalidateSize();addMap.invalidateSize()},150)}function authErrorMessage(err){switch(err&&err.code){case"auth/email-already-in-use":return"このユーザー名はすでに使われています。";case"auth/invalid-email":return"ユーザー名は半角英数字・._- のみ、3〜20文字で入力してください。";case"auth/weak-password":return"パスワードは4文字以上にしてください。";case"auth/user-not-found":case"auth/wrong-password":case"auth/invalid-credential":return"ユーザー名またはパスワードが違います。";case"auth/network-request-failed":return"通信に失敗しました。インターネット接続を確認してください。";case"auth/too-many-requests":return"試行回数が多すぎます。しばらくしてからお試しください。";default:return"エラーが発生しました。もう一度お試しください。"}}async function submitAuth(){const username=$("authName").value.trim();const password=$("authPass").value;if(!username||!password){$("authError").textContent="ユーザー名とパスワードを入力してください。";return}if(!USERNAME_RE.test(username)){$("authError").textContent="ユーザー名は半角英数字・._- のみ、3〜20文字で入力してください。";return}if(password.length<4){$("authError").textContent="パスワードは4文字以上にしてください。";return}const email=usernameToEmail(username);$("authSubmitBtn").disabled=true;try{if(authMode==="signup"){const cred=await auth.createUserWithEmailAndPassword(email,password);await cred.user.updateProfile({displayName:username});showToast("アカウントを作成しました")}else{await auth.signInWithEmailAndPassword(email,password);showToast("ログインしました")}}catch(err){console.error(err);$("authError").textContent=authErrorMessage(err)}finally{$("authSubmitBtn").disabled=false}}$("authToggleBtn").addEventListener("click",()=>{$("authPanel").classList.toggle("open");setTimeout(()=>{map.invalidateSize();addMap.invalidateSize()},80)});$("loginModeBtn").addEventListener("click",()=>setAuthMode("login"));$("signupModeBtn").addEventListener("click",()=>setAuthMode("signup"));$("authSubmitBtn").addEventListener("click",submitAuth);$("authPass").addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();submitAuth()}});$("logoutBtn").addEventListener("click",async()=>{pendingAuthMessage="ログアウトしました。";await auth.signOut()});setAuthMode("login");startSpotsListener();auth.onAuthStateChanged(user=>{if(user){enterApp(user.displayName||"ユーザー",user.uid)}else{showAuth(pendingAuthMessage);pendingAuthMessage=""}});
